name: Build/Release
on: [push, pull_request]
jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Electron App
        run: npm run build:${{ matrix.os == 'windows-latest' && 'win' || 'mac' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGN: true # Esto es vital para que no falle buscando certificados
      - name: List files (Debug)
        run: ls -R dist # Esto nos dirá en la consola dónde están los archivos realmente
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SonicEditor-Pro-${{ matrix.os }}
          path: dist/* # Esto subirá todo lo que encuentre en la carpeta dist
          if-no-files-found: error
